name: ssrf
patterns:
  - id: js-fetch-template
    regex: "fetch\\s*\\(\\s*`"
    severity: high
    confidence: 6
    cwe: CWE-918
    title: "fetch() with Template Literal"
    description: "HTTP fetch using template literal URL, potential SSRF if user-controlled"

  - id: js-fetch-variable
    regex: "fetch\\s*\\(\\s*[a-zA-Z_$][a-zA-Z0-9_$]*"
    severity: medium
    confidence: 5
    cwe: CWE-918
    title: "fetch() with Variable URL"
    description: "HTTP fetch using variable URL, verify the URL is not user-controlled"

  - id: js-axios-template
    regex: "axios\\.[a-z]+\\s*\\(\\s*`"
    severity: high
    confidence: 6
    cwe: CWE-918
    title: "Axios Request with Template Literal"
    description: "Axios HTTP request using template literal URL, potential SSRF"

  - id: js-got-template
    regex: "got\\s*\\(\\s*`"
    severity: high
    confidence: 6
    cwe: CWE-918
    title: "got() with Template Literal"
    description: "HTTP request via got using template literal URL, potential SSRF"

  - id: node-http-get-template
    regex: "https?\\.(get|request)\\s*\\(\\s*`"
    severity: high
    confidence: 6
    cwe: CWE-918
    title: "http.get/request with Template Literal"
    description: "Node.js HTTP request using template literal URL, potential SSRF"

  - id: python-requests-variable
    regex: "requests\\.(get|post|put|delete|patch|head)\\s*\\(\\s*[a-zA-Z_]"
    severity: medium
    confidence: 5
    cwe: CWE-918
    title: "Python requests with Variable URL"
    description: "Python requests library call with variable URL, verify not user-controlled"

  - id: python-requests-fstring
    regex: "requests\\.(get|post|put|delete|patch|head)\\s*\\(\\s*f[\"']"
    severity: high
    confidence: 6
    cwe: CWE-918
    title: "Python requests with f-string URL"
    description: "Python requests library call with f-string URL, potential SSRF"

  - id: cloud-metadata-endpoint
    regex: "169\\.254\\.169\\.254"
    severity: critical
    confidence: 8
    cwe: CWE-918
    title: "Cloud Metadata Endpoint Access"
    description: "Access to cloud instance metadata endpoint, commonly exploited in SSRF attacks"

  - id: internal-ip-access
    regex: "(?:https?://)?(?:10\\.|172\\.(?:1[6-9]|2[0-9]|3[01])\\.|192\\.168\\.)"
    severity: medium
    confidence: 5
    cwe: CWE-918
    title: "Internal IP Address Access"
    description: "Access to RFC 1918 private IP address, potential SSRF or hardcoded internal endpoint"

  - id: webhook-url-from-input
    regex: "(?i)webhook[_-]?url\\s*[=:]\\s*(?:req\\.|request\\.|params\\.|body\\.|query\\.)"
    severity: high
    confidence: 7
    cwe: CWE-918
    title: "Webhook URL from User Input"
    description: "Webhook URL taken directly from user input, potential SSRF"

  - id: csharp-httpclient-interpolation
    regex: "HttpClient.*\\$\""
    severity: high
    confidence: 5
    cwe: CWE-918
    title: "HttpClient with Interpolated URL"
    description: "HttpClient request with interpolated URL, verify not user-controlled"

  - id: localhost-access
    regex: "(?:https?://)?localhost:[0-9]+"
    severity: low
    confidence: 4
    cwe: CWE-918
    title: "Localhost Access"
    description: "Access to localhost, may indicate SSRF or development-only code in production"
