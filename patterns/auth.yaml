name: auth
patterns:
  - id: aspnet-int-route-constraint
    regex: "\\{\\s*(?:id|userId|tenantId|orderId|postId|customerId|accountId|documentId|resourceId)\\s*:\\s*int\\s*\\}"
    severity: medium
    confidence: 6
    cwe: CWE-639
    title: "Sequential Integer ID in Route — IDOR Candidate"
    description: "Route template uses a sequential integer ID. Confirm an ownership or tenant predicate enforces access; without it, a caller can enumerate resources belonging to other users (IDOR/BOLA)."

  - id: ef-find-by-id
    regex: "\\.\\s*Find\\s*\\(\\s*(?:id|userId|tenantId|orderId|postId|customerId|accountId|documentId|resourceId)\\s*\\)"
    severity: medium
    confidence: 6
    cwe: CWE-639
    title: "EF Find-by-Id Without Ownership Predicate"
    description: "DbSet.Find(id) loads an entity by primary key only — no ownership, tenant, or user filter is applied at the query layer. Any authorization check must happen explicitly afterwards. Confirm the caller's identity/tenant is verified against the loaded entity."

  - id: ef-first-by-id-only
    regex: "\\.\\s*(?:First|Single|FirstOrDefault|SingleOrDefault)\\s*\\(\\s*[a-zA-Z_]\\w*\\s*=>\\s*[a-zA-Z_]\\w*\\s*\\.\\s*Id\\s*==\\s*[a-zA-Z_]\\w*\\s*\\)"
    severity: medium
    confidence: 7
    cwe: CWE-639
    title: "LINQ Load-by-Id Without Ownership Predicate"
    description: "LINQ query loads an entity with a single-predicate lambda checking only the primary key. No user/tenant/ownership filter is in the predicate. A subsequent authorization check is required; without it, this is IDOR/BOLA."

  - id: raw-sql-where-id-only
    regex: "WHERE\\s+(?:[a-zA-Z_]\\w*\\.)?id\\s*=\\s*[@$:]\\w+\\s*(?:;|\"|$)"
    severity: medium
    confidence: 6
    cwe: CWE-639
    title: "Raw SQL Query With Only an Id Predicate"
    description: "SQL query filters by id alone with no user_id/tenant_id predicate. Confirm authorization happens in application code before the row is exposed."
