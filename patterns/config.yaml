name: config
patterns:
  - id: dockerfile-latest-tag
    regex: "FROM\\s+[a-zA-Z0-9./_-]+:latest"
    severity: medium
    confidence: 7
    cwe: CWE-1104
    title: "Dockerfile Uses :latest Tag"
    description: "Docker image uses :latest tag which is non-deterministic and may introduce unexpected changes"

  - id: dockerfile-secret-in-env
    regex: "(?i)ENV\\s+(PASSWORD|SECRET|TOKEN|API_KEY|PRIVATE_KEY|AWS_SECRET)\\s*="
    severity: high
    confidence: 8
    cwe: CWE-798
    title: "Secret in Dockerfile ENV"
    description: "Sensitive value set as environment variable in Dockerfile, visible in image layers"

  - id: dockerfile-secret-in-arg
    regex: "(?i)ARG\\s+(PASSWORD|SECRET|TOKEN|API_KEY|PRIVATE_KEY|AWS_SECRET)"
    severity: high
    confidence: 7
    cwe: CWE-798
    title: "Secret in Dockerfile ARG"
    description: "Sensitive value passed as build argument in Dockerfile"

  - id: dockerfile-no-user
    regex: "^FROM\\s+(?!.*AS\\s+).*$"
    severity: low
    confidence: 3
    cwe: CWE-250
    title: "Dockerfile May Run as Root"
    description: "Dockerfile FROM without USER directive may run containers as root"

  - id: k8s-privileged
    regex: "privileged\\s*:\\s*true"
    severity: critical
    confidence: 8
    cwe: CWE-250
    title: "Kubernetes Privileged Container"
    description: "Container running in privileged mode with full host access"

  - id: k8s-no-resource-limits
    regex: "(?i)containers:\\s*$"
    severity: medium
    confidence: 3
    cwe: CWE-770
    title: "Kubernetes Container Without Resource Limits"
    description: "Container definition may lack resource limits, risking resource exhaustion"

  - id: terraform-public-s3
    regex: "acl\\s*=\\s*\"public-read\""
    severity: high
    confidence: 8
    cwe: CWE-732
    title: "Terraform Public S3 Bucket"
    description: "S3 bucket configured with public-read ACL"

  - id: terraform-open-security-group
    regex: "cidr_blocks\\s*=\\s*\\[\\s*\"0\\.0\\.0\\.0/0\"\\s*\\]"
    severity: high
    confidence: 7
    cwe: CWE-284
    title: "Terraform Open Security Group"
    description: "Security group allows ingress from 0.0.0.0/0"

  - id: terraform-wildcard-iam
    regex: "actions\\s*=\\s*\\[\\s*\"\\*\"\\s*\\]"
    severity: critical
    confidence: 7
    cwe: CWE-250
    title: "Terraform Wildcard IAM Policy"
    description: "IAM policy grants wildcard (*) permissions"

  - id: cors-wildcard-credentials
    regex: "(?i)Access-Control-Allow-Origin.*\\*"
    severity: high
    confidence: 6
    cwe: CWE-942
    title: "CORS Wildcard Origin"
    description: "CORS allows all origins, risky when combined with credentials"

  - id: debug-mode-enabled
    regex: "(?i)(DEBUG\\s*=\\s*(?:true|1|\"true\")|debug\\s*:\\s*true)"
    severity: medium
    confidence: 5
    cwe: CWE-489
    title: "Debug Mode Enabled"
    description: "Debug mode enabled, may expose sensitive information in production"

  - id: node-tls-reject-disabled
    regex: "NODE_TLS_REJECT_UNAUTHORIZED\\s*=\\s*[\"']?0[\"']?"
    severity: high
    confidence: 9
    cwe: CWE-295
    title: "TLS Certificate Verification Disabled (Node.js)"
    description: "NODE_TLS_REJECT_UNAUTHORIZED=0 disables all TLS certificate verification"

  - id: node-reject-unauthorized-false
    regex: "rejectUnauthorized\\s*:\\s*false"
    severity: high
    confidence: 8
    cwe: CWE-295
    title: "TLS rejectUnauthorized Disabled"
    description: "TLS certificate verification disabled via rejectUnauthorized: false"

  - id: k8s-host-network
    regex: "hostNetwork\\s*:\\s*true"
    severity: high
    confidence: 8
    cwe: CWE-284
    title: "Kubernetes Host Network"
    description: "Pod uses host network namespace, bypassing network isolation"

  - id: k8s-host-pid
    regex: "hostPID\\s*:\\s*true"
    severity: high
    confidence: 8
    cwe: CWE-284
    title: "Kubernetes Host PID"
    description: "Pod uses host PID namespace, can see and signal host processes"
