name: secrets
patterns:
  - id: aws-access-key
    regex: "AKIA[0-9A-Z]{16}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "AWS Access Key ID"
    description: "Hardcoded AWS access key identifier"

  - id: aws-secret-key
    regex: "(?i)aws_secret_access_key\\s*[=:]\\s*[A-Za-z0-9/+=]{40}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "AWS Secret Access Key"
    description: "Hardcoded AWS secret access key"

  - id: github-pat
    regex: "ghp_[A-Za-z0-9]{36}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "GitHub Personal Access Token"
    description: "Hardcoded GitHub personal access token"

  - id: github-oauth
    regex: "gho_[A-Za-z0-9]{36}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "GitHub OAuth Token"
    description: "Hardcoded GitHub OAuth access token"

  - id: github-app
    regex: "ghs_[A-Za-z0-9]{36}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "GitHub App Installation Token"
    description: "Hardcoded GitHub App installation token"

  - id: stripe-secret-key
    regex: "sk_live_[A-Za-z0-9]{24,}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "Stripe Secret Key"
    description: "Hardcoded Stripe live secret key"

  - id: stripe-publishable-key
    regex: "pk_live_[A-Za-z0-9]{24,}"
    severity: high
    confidence: 7
    cwe: CWE-798
    title: "Stripe Publishable Key"
    description: "Hardcoded Stripe live publishable key"

  - id: google-api-key
    regex: "AIza[0-9A-Za-z_-]{35}"
    severity: high
    confidence: 8
    cwe: CWE-798
    title: "Google API Key"
    description: "Hardcoded Google API key"

  - id: slack-token
    regex: "xox[bpors]-[A-Za-z0-9-]{10,}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "Slack Token"
    description: "Hardcoded Slack API token"

  - id: slack-webhook
    regex: "https://hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+"
    severity: high
    confidence: 8
    cwe: CWE-798
    title: "Slack Webhook URL"
    description: "Hardcoded Slack webhook URL"

  - id: discord-token
    regex: "[MN][A-Za-z0-9]{23,}\\.[A-Za-z0-9_-]{6}\\.[A-Za-z0-9_-]{27,}"
    severity: critical
    confidence: 8
    cwe: CWE-798
    title: "Discord Bot Token"
    description: "Hardcoded Discord bot token"

  - id: twilio-api-key
    regex: "SK[0-9a-fA-F]{32}"
    severity: high
    confidence: 7
    cwe: CWE-798
    title: "Twilio API Key"
    description: "Hardcoded Twilio API key"

  - id: sendgrid-api-key
    regex: "SG\\.[A-Za-z0-9_-]{22}\\.[A-Za-z0-9_-]{43}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "SendGrid API Key"
    description: "Hardcoded SendGrid API key"

  - id: npm-token
    regex: "(?i)npm_[A-Za-z0-9]{36}"
    severity: critical
    confidence: 8
    cwe: CWE-798
    title: "npm Access Token"
    description: "Hardcoded npm access token"

  - id: pypi-token
    regex: "pypi-[A-Za-z0-9_-]{50,}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "PyPI API Token"
    description: "Hardcoded PyPI API token"

  - id: rsa-private-key
    regex: "-----BEGIN RSA PRIVATE KEY-----"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "RSA Private Key"
    description: "Embedded RSA private key"

  - id: ssh-private-key
    regex: "-----BEGIN OPENSSH PRIVATE KEY-----"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "SSH Private Key"
    description: "Embedded SSH private key"

  - id: generic-private-key
    regex: "-----BEGIN PRIVATE KEY-----"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "Private Key"
    description: "Embedded generic private key"

  - id: connection-string-password
    regex: "(?i)(connection\\s*string|connectionstring|sqlconnection).*password\\s*=\\s*[^;\\s]{3,}"
    severity: high
    confidence: 7
    cwe: CWE-798
    title: "Connection String with Password"
    description: "Database connection string containing an embedded password"

  - id: jwt-token
    regex: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
    severity: high
    confidence: 7
    cwe: CWE-798
    title: "JWT Token"
    description: "Hardcoded JSON Web Token"

  - id: generic-api-key-assignment
    regex: "(?i)(api[_-]?key|apikey|api[_-]?secret)\\s*[=:]\\s*[\"'][A-Za-z0-9_-]{16,}[\"']"
    severity: high
    confidence: 6
    cwe: CWE-798
    title: "Generic API Key Assignment"
    description: "Potential hardcoded API key in variable assignment"

  - id: generic-secret-assignment
    regex: "(?i)(secret|password|passwd|pwd|token)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
    severity: medium
    confidence: 4
    cwe: CWE-798
    title: "Generic Secret Assignment"
    description: "Potential hardcoded secret in variable assignment"

  - id: placeholder-your-key
    regex: "(?i)[\"'][A-Za-z0-9_]*your[_-]?(key|token|secret|password)[_-]?here[A-Za-z0-9_]*[\"']"
    severity: medium
    confidence: 5
    cwe: CWE-798
    title: "Placeholder Secret (your_key_here)"
    description: "Placeholder secret value that should be replaced before deployment"

  - id: placeholder-change-me
    regex: "(?i)(CHANGE_ME|CHANGEME|REPLACE_ME|REPLACEME|TODO_REPLACE)"
    severity: medium
    confidence: 5
    cwe: CWE-798
    title: "Placeholder Secret (CHANGE_ME)"
    description: "Placeholder value indicating a secret that needs replacement"

  - id: placeholder-sk-xxx
    regex: "(?i)[\"']sk-[xX]{3,}[\"']"
    severity: medium
    confidence: 6
    cwe: CWE-798
    title: "Placeholder Secret Key (sk-xxx)"
    description: "Placeholder secret key pattern indicating a value that needs replacement"

  - id: openai-api-key
    regex: "sk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}"
    severity: critical
    confidence: 9
    cwe: CWE-798
    title: "OpenAI API Key"
    description: "Hardcoded OpenAI API key"

  - id: mailchimp-api-key
    regex: "[0-9a-f]{32}-us[0-9]{1,2}"
    severity: high
    confidence: 7
    cwe: CWE-798
    title: "Mailchimp API Key"
    description: "Hardcoded Mailchimp API key"
