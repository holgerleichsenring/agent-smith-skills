name: injection
patterns:
  - id: js-eval-variable
    regex: "\\beval\\s*\\([^)]*[+`$]"
    severity: critical
    confidence: 8
    cwe: CWE-94
    title: "eval() with Dynamic Input"
    description: "eval() called with variable or template literal input, enabling code injection"

  - id: js-new-function-variable
    regex: "new\\s+Function\\s*\\([^)]*[+`$]"
    severity: critical
    confidence: 8
    cwe: CWE-94
    title: "new Function() with Dynamic Input"
    description: "Function constructor called with dynamic input, enabling code injection"

  - id: js-exec-template
    regex: "(?:exec|execSync|spawn|spawnSync)\\s*\\([^)]*`"
    severity: critical
    confidence: 8
    cwe: CWE-78
    title: "Command Execution with Template Literal"
    description: "Shell command execution using template literal, vulnerable to command injection"

  - id: js-exec-concat
    regex: "(?:exec|execSync|spawn|spawnSync)\\s*\\([^)]*\\+"
    severity: critical
    confidence: 7
    cwe: CWE-78
    title: "Command Execution with String Concatenation"
    description: "Shell command execution using string concatenation, vulnerable to command injection"

  - id: js-shell-true
    regex: "shell\\s*:\\s*true"
    severity: high
    confidence: 6
    cwe: CWE-78
    title: "Shell Mode Enabled"
    description: "Process spawned with shell: true, increasing command injection risk"

  - id: react-dangerous-html
    regex: "dangerouslySetInnerHTML"
    severity: high
    confidence: 7
    cwe: CWE-79
    title: "dangerouslySetInnerHTML Usage"
    description: "React dangerouslySetInnerHTML can lead to XSS if input is not sanitized"

  - id: js-innerhtml-assignment
    regex: "\\.innerHTML\\s*[+]?="
    severity: high
    confidence: 7
    cwe: CWE-79
    title: "innerHTML Assignment"
    description: "Direct innerHTML assignment can lead to XSS if input is not sanitized"

  - id: vue-v-html
    regex: "v-html\\s*="
    severity: high
    confidence: 7
    cwe: CWE-79
    title: "Vue v-html Directive"
    description: "Vue v-html directive renders raw HTML, vulnerable to XSS"

  - id: js-document-write
    regex: "document\\.write\\s*\\("
    severity: high
    confidence: 7
    cwe: CWE-79
    title: "document.write() Usage"
    description: "document.write() can introduce XSS vulnerabilities"

  - id: sql-string-concat
    regex: "(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\\s+.*[\"']\\s*\\+"
    severity: critical
    confidence: 7
    cwe: CWE-89
    title: "SQL String Concatenation"
    description: "SQL query built with string concatenation, vulnerable to SQL injection"

  - id: sql-template-literal
    regex: "(?i)(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)\\s+.*\\$\\{"
    severity: critical
    confidence: 7
    cwe: CWE-89
    title: "SQL with Template Literal"
    description: "SQL query built with template literal interpolation, vulnerable to SQL injection"

  - id: python-pickle-loads
    regex: "pickle\\.loads?\\s*\\("
    severity: high
    confidence: 7
    cwe: CWE-502
    title: "pickle.load(s) Usage"
    description: "Deserializing untrusted data with pickle can execute arbitrary code"

  - id: python-yaml-unsafe-load
    regex: "yaml\\.load\\s*\\([^)]*(?!Loader\\s*=\\s*(?:yaml\\.)?SafeLoader)"
    severity: high
    confidence: 6
    cwe: CWE-502
    title: "yaml.load without SafeLoader"
    description: "yaml.load without SafeLoader can execute arbitrary code"

  - id: php-unserialize
    regex: "unserialize\\s*\\("
    severity: high
    confidence: 6
    cwe: CWE-502
    title: "PHP unserialize() Usage"
    description: "Deserializing untrusted data with unserialize can lead to object injection"

  - id: js-settimeout-string
    regex: "setTimeout\\s*\\(\\s*[\"'`]"
    severity: medium
    confidence: 6
    cwe: CWE-94
    title: "setTimeout with String Argument"
    description: "setTimeout with a string argument behaves like eval()"

  - id: csharp-process-start-interpolation
    regex: "Process\\.Start\\s*\\([^)]*\\$\""
    severity: high
    confidence: 7
    cwe: CWE-78
    title: "Process.Start with Interpolated String"
    description: "Process.Start using string interpolation, vulnerable to command injection"
