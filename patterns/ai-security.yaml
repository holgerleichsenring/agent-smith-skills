name: ai-security
patterns:
  - id: prompt-injection-concat
    regex: "(?i)(prompt|system[_-]?message|instruction)\\s*[+=]\\s*.*(?:user[_-]?input|req\\.|request\\.|body\\.|params\\.)"
    severity: high
    confidence: 6
    cwe: CWE-77
    title: "User Input Concatenated in Prompt"
    description: "User input concatenated directly into LLM prompt, vulnerable to prompt injection"

  - id: prompt-injection-template
    regex: "(?i)(prompt|system[_-]?message|instruction)\\s*=\\s*(?:`.*\\$\\{|f[\"'].*\\{)"
    severity: high
    confidence: 6
    cwe: CWE-77
    title: "User Input Interpolated in Prompt"
    description: "User input interpolated into LLM prompt via template literal or f-string"

  - id: eval-llm-output
    regex: "(?i)eval\\s*\\(.*(?:response|completion|output|result|answer|generated)"
    severity: critical
    confidence: 7
    cwe: CWE-94
    title: "eval() on LLM Output"
    description: "LLM output passed to eval(), enabling arbitrary code execution"

  - id: llm-output-in-sql
    regex: "(?i)(?:SELECT|INSERT|UPDATE|DELETE).*(?:response|completion|output|generated)"
    severity: critical
    confidence: 6
    cwe: CWE-89
    title: "LLM Output in SQL Query"
    description: "LLM-generated content used in SQL query, vulnerable to SQL injection"

  - id: no-max-tokens
    regex: "(?i)(openai|anthropic|claude|gpt|llm|chat).*(?:create|complete|generate)(?!.*max[_-]?tokens)"
    severity: medium
    confidence: 4
    cwe: CWE-770
    title: "LLM Call Without max_tokens"
    description: "LLM API call without max_tokens limit, risk of excessive resource consumption"

  - id: tools-without-confirmation
    regex: "(?i)(tool[_-]?(?:use|call|exec)|function[_-]?call).*(?:auto|direct|immediate)"
    severity: high
    confidence: 5
    cwe: CWE-862
    title: "Tool Execution Without Human Confirmation"
    description: "LLM tool/function execution without human-in-the-loop confirmation"

  - id: system-prompt-in-client
    regex: "(?i)(system[_-]?prompt|system[_-]?message|system[_-]?instruction)\\s*[=:]\\s*[\"'`]"
    severity: medium
    confidence: 5
    cwe: CWE-200
    title: "System Prompt in Client Code"
    description: "System prompt defined in client-side code, visible to end users"

  - id: llm-output-in-exec
    regex: "(?i)(exec|spawn|system|popen|subprocess)\\s*\\(.*(?:response|completion|output|generated)"
    severity: critical
    confidence: 7
    cwe: CWE-78
    title: "LLM Output in Command Execution"
    description: "LLM-generated content used in shell command execution"

  - id: llm-output-in-html
    regex: "(?i)(innerHTML|dangerouslySetInnerHTML|v-html|document\\.write).*(?:response|completion|output|generated)"
    severity: high
    confidence: 6
    cwe: CWE-79
    title: "LLM Output in HTML Rendering"
    description: "LLM-generated content rendered as raw HTML, vulnerable to XSS"

  - id: api-key-in-frontend
    regex: "(?i)(openai|anthropic|cohere|huggingface)[_-]?api[_-]?key\\s*[=:]\\s*[\"']"
    severity: critical
    confidence: 8
    cwe: CWE-798
    title: "LLM API Key in Source Code"
    description: "LLM provider API key hardcoded in source code"

  - id: embedding-without-sanitize
    regex: "(?i)embed(?:ding)?s?\\s*[=(].*(?:user[_-]?input|req\\.|request\\.|body\\.)"
    severity: medium
    confidence: 4
    cwe: CWE-77
    title: "User Input in Embedding Without Sanitization"
    description: "User input passed directly to embedding API without sanitization"
