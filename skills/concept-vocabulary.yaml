# Concept vocabulary referenced by SKILL activation.positive keys.
#
# activation.positive keys MUST reference an entry below — ConceptVocabularyValidator
# (introduced in p0111a) warns on missing keys. activation.negative keys and
# role_assignment.<role>.positive/negative keys are skill-local and free-form;
# they do not need to appear here.
#
# Three semantic sections, one flat namespace at lookup time:
#   project_concepts: stack-agnostic project capabilities, populated by
#                     ProjectAnalyzer (p0110b) into ProjectMapExcerpt
#   change_signals:   ticket-content classifications inferred by triage from
#                     the ticket text and diff hint
#   run_context:      pipeline/run-level flags
#
# Operators may extend any section. Duplicate keys across sections are an error
# (validator rejects). Skills reference keys without section prefix because the
# namespace is flat.

concepts:
  project_concepts:
    - {key: persistence, desc: "Project stores state durably (databases, KV stores, persisted files)"}
    - {key: listeners, desc: "Project consumes external events (webhooks, queues, file watchers)"}
    - {key: background_jobs, desc: "Project runs async or scheduled work decoupled from request handling"}
    - {key: external_apis, desc: "Project calls third-party APIs or remote services"}
    - {key: authentication, desc: "Project verifies identity (login, tokens, sessions, certificates)"}
    - {key: authorization, desc: "Project enforces access rules (roles, permissions, policies)"}
    - {key: ui_rendering, desc: "Project renders user interface (web, desktop, mobile, terminal)"}
    - {key: cli_interface, desc: "Project exposes a command-line interface as a primary surface"}
    - {key: configuration_management, desc: "Project consumes structured runtime configuration"}
    - {key: infrastructure_definition, desc: "Project ships infrastructure-as-code (k8s, terraform, helm, dockerfile)"}
    - {key: public_api, desc: "Project exposes a documented external API (REST, GraphQL, gRPC)"}
    - {key: schedulers, desc: "Project triggers work on time-based schedules (cron, periodic timers)"}
    - {key: file_io, desc: "Project reads or writes filesystem content as a primary domain operation"}
    - {key: cryptography, desc: "Project performs encryption, signing, hashing, or key management"}
    - {key: ai_or_llm_code, desc: "Project includes AI/LLM/MCP integration code (prompts, tools, agents, RAG)"}
    - {key: pii_handling, desc: "Project processes personally identifiable information (PII) or personal data"}
    - {key: auth_scheme_present, desc: "API target declares one or more security schemes in its OpenAPI spec (OAuth2, bearer, apiKey)"}
    - {key: id_path_parameters, desc: "API target exposes routes with id-style path parameters ({id}, {userId}, {orderId})"}
    - {key: request_body_endpoints, desc: "API target exposes endpoints accepting request bodies (POST/PUT/PATCH with content)"}
    - {key: role_based_endpoints, desc: "API target implies role-based access (admin paths, scope-restricted operations, role enums in schema)"}

  change_signals:
    - {key: pattern_decision, desc: "Pattern- or boundary-decision in ticket"}
    - {key: new_component, desc: "New component, service, or module being added"}
    - {key: migration, desc: "Migration between layers, databases, or frameworks"}
    - {key: cross_cutting, desc: "Cross-cutting concern (logging, auth, caching) introduced or changed"}
    - {key: layer_touch, desc: "Code change crosses architectural layer boundaries"}
    - {key: code_change, desc: "Ticket changes executable code (not pure docs)"}
    - {key: new_business_logic, desc: "New behavior added that should have tests"}
    - {key: regression_risk, desc: "Bugfix or refactor where missing test could mask future regressions"}
    - {key: refactor_in_tested_module, desc: "Refactor in module that has existing tests"}
    - {key: backend_code_change, desc: "Ticket changes server-side code (handlers, services, business logic)"}
    - {key: db_schema_change, desc: "Ticket changes database schema (DDL, migration, ORM model)"}
    - {key: query_perf_concern, desc: "Ticket touches query patterns or performance-sensitive data access"}
    - {key: data_integrity_change, desc: "Ticket affects data integrity (constraints, foreign keys, nullability)"}
    - {key: ci_pipeline_change, desc: "Ticket touches CI/CD pipeline configuration"}
    - {key: deployment_change, desc: "Ticket affects how the application is deployed"}
    - {key: infra_resource_change, desc: "Ticket adds or changes infrastructure resources (containers, k8s, IaC)"}
    - {key: ui_component_change, desc: "Ticket changes UI components or rendering"}
    - {key: frontend_state_change, desc: "Ticket changes frontend state management or data flow"}
    - {key: user_facing_change, desc: "Ticket changes user-visible behavior or workflow"}
    - {key: scope_clarification_needed, desc: "Ticket has ambiguous or missing acceptance criteria"}
    - {key: security_fix, desc: "Ticket fixes a security vulnerability"}
    - {key: auth_code_change, desc: "Ticket changes authentication or authorization code"}
    - {key: untrusted_input_handling, desc: "Ticket changes how external input is parsed, validated, or routed to sinks"}
    - {key: prompt_or_tool_change, desc: "Ticket changes LLM prompts, agentic tools, MCP servers, or RAG pipelines"}
    - {key: data_export_or_logging, desc: "Ticket changes how data is logged, exported, or sent to third parties"}
    - {key: config_or_infra_change, desc: "Ticket changes infra/config files (Dockerfile, k8s manifest, terraform, CI yaml)"}
    - {key: query_or_command_change, desc: "Ticket changes SQL/NoSQL/LDAP/XPath queries or shell command construction"}
    - {key: secrets_risk_pattern, desc: "Diff includes patterns suggestive of hardcoded credentials, keys, or tokens"}
    - {key: dependency_manifest_change, desc: "Ticket changes dependency manifest (package.json, *.csproj, requirements.txt, go.mod, Pipfile)"}
    - {key: lockfile_change, desc: "Ticket changes a dependency lockfile"}
    - {key: dependency_bump, desc: "Ticket bumps one or more dependency versions"}

  run_context:
    - {key: security_findings_present, desc: "Current pipeline run has produced security observations"}
    - {key: scan_context, desc: "Active pipeline is a scan pipeline (security-scan, api-scan)"}
    - {key: multiple_finding_sources, desc: "Findings in current run come from multiple sources (commodity tools + LLM skills)"}
    - {key: nuclei_findings, desc: "Current run has Nuclei scan findings ready for OWASP API categorisation"}
    - {key: api_target, desc: "Pipeline target is a REST or GraphQL API surface"}
    - {key: owasp_api_concern, desc: "Ticket or run context flags an OWASP API Security Top 10 concern"}
    - {key: api_security_scan, desc: "Active pipeline is api-security-scan (vs generic security-scan or other pipeline types)"}
    - {key: swagger_spec, desc: "OpenAPI/Swagger spec was loaded successfully and is available to skills"}
    - {key: api_source_available, desc: "Repo source for the API target was cloned and is available for code-aware static review"}
    - {key: auth_bootstrap_files, desc: "Auth-bootstrap source excerpts (Program.cs, Startup, security middleware) are extracted and ready for review"}
    - {key: controller_handlers_mapped, desc: "ApiCodeContext mapped controller routes to source handlers — handler-bodies available for ownership / authorization review"}
    - {key: upload_handlers_mapped, desc: "ApiCodeContext mapped file-upload handlers — handler-bodies available for upload-validator review"}
    - {key: header_findings, desc: "Current run has header-related findings from Nuclei or ZAP ready for posture review"}
    - {key: api_headers_baseline, desc: "api-headers baseline (baselines/api-headers.yaml) loaded and available for header-audit comparison"}
    - {key: multiple_personas, desc: "Multiple authentication personas (user1+user2, user1+admin) are configured for active probing"}
    - {key: findings_present, desc: "Current run has produced at least one observation (any concern, any source)"}
    - {key: multiple_findings, desc: "Current run has produced multiple observations that may share root causes worth chaining"}
