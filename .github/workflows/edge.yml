name: edge

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  package-edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build edge tarball
        run: |
          chmod +x scripts/package.sh
          scripts/package.sh edge

      - name: Verify SHA256 sidecar
        run: |
          cd dist
          sha256sum -c agentsmith-skills-edge.tar.gz.sha256

      - name: Update edge release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: edge
          name: edge
          prerelease: true
          body: |
            Rolling edge build of `agentsmith-skills`.
            Tracks `main` — replaced on every push. Not version-pinned.
            For production, use a `vX.Y.Z` tag instead.
          files: |
            dist/agentsmith-skills-edge.tar.gz
            dist/agentsmith-skills-edge.tar.gz.sha256
