name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build deterministic tarball
        run: |
          chmod +x scripts/package.sh
          scripts/package.sh "${{ needs.release-please.outputs.tag_name }}"

      - name: Verify SHA256 sidecar
        run: |
          cd dist
          sha256sum -c "agentsmith-skills-${{ needs.release-please.outputs.tag_name }}.tar.gz.sha256"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "dist/agentsmith-skills-${{ needs.release-please.outputs.tag_name }}.tar.gz" \
            "dist/agentsmith-skills-${{ needs.release-please.outputs.tag_name }}.tar.gz.sha256" \
            --clobber
