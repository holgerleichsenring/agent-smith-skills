name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
    # Tarball packaging is decoupled into package-release.yml, which triggers
    # on the GitHub `release: published` event. release-please publishes a
    # release as part of its flow, so the chain still works for normal
    # releases — but a missed/skipped release-please run no longer leaves
    # the release without its tarball asset.
