name: Package Release

# Manual recovery workflow: rebuilds + reuploads the tarball + sha256 sidecar
# for a previously-tagged release. Used when a release was created outside the
# normal release-please flow (e.g. manually-tagged release, or a release-please
# run that skipped because its conventional-commit prefix got lost during squash
# merge).
#
# The normal auto-flow lives in release-please.yml as an inline package job —
# we do NOT trigger this workflow from `release: published`, because GitHub
# Actions does not trigger downstream workflows from events created by the
# default GITHUB_TOKEN (release-please uses that token).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (e.g. v1.7.0)"
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build deterministic tarball
        run: |
          chmod +x scripts/package.sh
          scripts/package.sh "${{ inputs.tag }}"

      - name: Verify SHA256 sidecar
        run: |
          cd dist
          sha256sum -c "agentsmith-skills-${{ inputs.tag }}.tar.gz.sha256"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            "dist/agentsmith-skills-${{ inputs.tag }}.tar.gz" \
            "dist/agentsmith-skills-${{ inputs.tag }}.tar.gz.sha256" \
            --clobber
